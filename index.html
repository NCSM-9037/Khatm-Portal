/* Credit line — bottom-right */
.design-ui-credit {
  position: fixed;
  bottom: 12px;
  right: 12px;
  font: 11px/1 system-ui, sans-serif;
  color: rgba(128,128,128,0.5);
  pointer-events: none;
  z-index: 2147483647;
  transition: opacity 0.4s ease;
  user-select: none;
  letter-spacing: 0.02em;
}

/* Hide chrome on touch devices */
@media (hover: none) {
  .design-ui-credit { display: none; }
}

/* Print fixes */
@media print {
  * {
    transition: none !important;
    animation: none !important;
    box-shadow: none !important;
  }
  body {
    print-color-adjust: exact;
    -webkit-print-color-adjust: exact;
  }
  .design-ui-credit { display: none !important; }
}

</style>
<script>
(function () {
    // Design-ui pages are single compositions, so the whole body is editable.
    function markEditable() {
        document.body.classList.add('artifact-editable');
    }

    // Credit badge with idle-fade. Hover devices only.
    function initChromeUI() {
        if (!matchMedia('(hover: hover)').matches) return;

        var credit = document.createElement('div');
        credit.className = 'design-ui-credit';
        credit.setAttribute('aria-hidden', 'true');
        credit.innerHTML = '\u{1F49C} by ClickUp Brain';
        document.body.appendChild(credit);

        var timer = null;
        var fade = function (out) { credit.style.opacity = out ? '0' : ''; };
        fade(true);
        var show = function () {
            fade(false);
            clearTimeout(timer);
            timer = setTimeout(function () { fade(true); }, 3000);
        };
        document.addEventListener('mousemove', show);
        show();
    }

    function init() {
        markEditable();
        initChromeUI();
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
})();

</script>

<script>
/* ================= SUPABASE CONFIG ================= */
const SUPABASE_URL="https://venjpgagaxgukdvvkodp.supabase.co";
const SUPABASE_KEY="sb_publishable_U8f0Mh_-TUbkYqr1wnvRwg_OKKCP4eS";
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const GREETING_AR="السَّلامُ عَلَيْكُم";
const JUZ_NAMES=["الم","سيقول","تلك الرسل","لن تنالوا","والمحصنات","لا يحب الله","وإذا سمعوا","ولو أننا","قال الملأ","واعلموا","يعتذرون","وما من دابة","وما أبرئ","ربما","سبحان الذي","قال ألم","اقترب للناس","قد أفلح","وقال الذين","أمن خلق","اتل ما أوحي","ومن يقنت","وما لي","فمن أظلم","إليه يرد","حم","قال فما خطبكم","قد سمع الله","تبارك الذي","عم يتساءلون"];
const AVATAR_HUES=[258,35,160,300,82,210,20,130];
const FAM_HUES=[258,35,160,300,82,20];
const $=id=>document.getElementById(id);

/* ================= STATE ================= */
let me=null;
let families=[];
let state={view:"home",familyId:null,familyTab:"khatm",juzFilter:"all",juzSearch:"",query:""};
let realtimeChan=null,reloadTimer=null;

/* ================= HELPERS ================= */
function initials(n){return (n||"?").split(/\s+/).map(w=>w[0]).slice(0,2).join("").toUpperCase();}
function firstName(n){return (n||"").split(" ")[0];}
function hueForId(id){let h=0;for(const c of (id||""))h=(h+c.charCodeAt(0))%AVATAR_HUES.length;return AVATAR_HUES[h];}
function famHue(id){let h=0;for(const c of (id||""))h=(h+c.charCodeAt(0))%FAM_HUES.length;return FAM_HUES[h];}
function avatar(m,cls=""){if(!m)return `<div class="avatar ${cls}" style="background:var(--border-strong)">?</div>`;return `<div class="avatar ${cls}" style="background:oklch(55% 0.11 ${hueForId(m.id)})">${initials(m.name)}</div>`;}
function esc(s){return String(s==null?"":s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function fmtDate(ts){return ts?new Date(ts).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"}):"";}
function famById(id){return families.find(f=>f.id===id);}
function memberById(fam,id){return fam.members.find(m=>m.id===id);}
function activeKhatm(fam){return fam.khatms.find(k=>k.status==="active");}
function khatmStats(k){const j=k.juz;const completed=j.filter(x=>x.status==="completed").length,reserved=j.filter(x=>x.status==="reserved").length,available=j.filter(x=>x.status==="available").length;return {completed,reserved,available,remaining:30-completed,pct:Math.round(completed/30*100)};}
function greeting(){return `<span class="greet-ar">${GREETING_AR}</span>, ${firstName(me.name)}`;}
function joinUrl(token){return location.origin+location.pathname+"?join="+token;}
function personalStats(){
  let completed=0,reserved=0;
  families.forEach(f=>f.khatms.forEach(k=>k.juz.forEach(j=>{
    if(j.member_id===me.id){if(j.status==="completed")completed++;if(j.status==="reserved")reserved++;}
  })));
  return {completed,reserved,khatmsDone:Math.floor(completed/30),towardNext:completed%30,famCount:families.length};
}

/* ================= JOIN BY LINK ================= */
async function handleJoinLink(){
  const token=new URLSearchParams(location.search).get("join");
  if(!token)return;
  const {data:{user}}=await sb.auth.getUser();
  if(!user){sessionStorage.setItem("pendingJoin",token);return;}
  const {data:fam}=await sb.from("families").select("id,name").eq("join_token",token).maybeSingle();
  history.replaceState({},"",location.pathname);
  if(!fam){toast("That invite link is invalid",true);return;}
  const {error}=await sb.from("family_members").insert({family_id:fam.id,user_id:user.id,role:"member"});
  if(error&&error.code==="23505"){toast(`You're already in ${fam.name}`);}
  else if(error){toast(error.message,true);return;}
  else toast(`Joined ${fam.name}`);
  await loadAll();buildFamNav();openFamily(fam.id);
}

/* ================= DATA LOADING ================= */
async function loadAll(){
  const {data:{user}}=await sb.auth.getUser();
  if(!user)throw new Error("no-session");
  let {data:prof}=await sb.from("profiles").select("*").eq("id",user.id).maybeSingle();
  if(!prof)throw new Error("Profile not ready yet. If you just signed up, wait a moment and refresh.");
  me=prof;
  const {data:mm}=await sb.from("family_members").select("role,family_id,families(id,name,join_token)").eq("user_id",user.id);
  const famRows=(mm||[]).filter(r=>r.families).map(r=>({...r.families,role:r.role}));
  const famIds=famRows.map(f=>f.id);
  let membersByFam={};
  if(famIds.length){
    const {data:allMembers}=await sb.from("family_members").select("family_id,role,profiles(id,name,email)").in("family_id",famIds);
    (allMembers||[]).forEach(r=>{if(!r.profiles)return;(membersByFam[r.family_id]=membersByFam[r.family_id]||[]).push({id:r.profiles.id,name:r.profiles.name,email:r.profiles.email,role:r.role});});
  }
  let khatmsByFam={},juzByKhatm={};
  if(famIds.length){
    const {data:khatms}=await sb.from("khatms").select("*").in("family_id",famIds).order("started_at",{ascending:false});
    const kIds=(khatms||[]).map(k=>k.id);
    let juz=[];
    if(kIds.length){const {data:jz}=await sb.from("juz").select("*").in("khatm_id",kIds);juz=jz||[];}
    juz.forEach(j=>{(juzByKhatm[j.khatm_id]=juzByKhatm[j.khatm_id]||[]).push(j);});
    (khatms||[]).forEach(k=>{(khatmsByFam[k.family_id]=khatmsByFam[k.family_id]||[]).push({...k,juz:(juzByKhatm[k.id]||[]).sort((a,b)=>a.number-b.number)});});
  }
  families=famRows.map(f=>({...f,hue:famHue(f.id),members:membersByFam[f.id]||[],khatms:khatmsByFam[f.id]||[]}));
}
function subscribeRealtime(){
  if(realtimeChan)sb.removeChannel(realtimeChan);
  realtimeChan=sb.channel("khatm-realtime")
    .on("postgres_changes",{event:"*",schema:"public",table:"juz"},debouncedReload)
    .on("postgres_changes",{event:"*",schema:"public",table:"khatms"},debouncedReload)
    .on("postgres_changes",{event:"*",schema:"public",table:"family_members"},debouncedReload)
    .subscribe();
}
function debouncedReload(){clearTimeout(reloadTimer);reloadTimer=setTimeout(async()=>{try{await loadAll();buildFamNav();paint();}catch(e){}},400);}
async function refresh(){try{await loadAll();buildFamNav();paint();}catch(e){toast("Couldn't refresh",true);}}

    <div class="toolbar">
      <div class="search-box"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg><input type="text" id="juz-search" placeholder="Search juz number or member…" value="${esc(state.juzSearch||"")}"></div>
      <div class="filter-tabs">${["all","available","reserved","completed"].map(fl=>{const cnt=fl==="all"?30:s[fl];return `<button class="filter-tab ${state.juzFilter===fl?"active":""}" data-f="${fl}">${fl[0].toUpperCase()+fl.slice(1)}<span class="cnt">${cnt}</span></button>`;}).join("")}</div>
    </div>
    <div class="juz-grid" id="juz-grid"></div>`;
  $("juz-search").addEventListener("input",e=>{state.juzSearch=e.target.value;drawJuz(f,k);});
  body.querySelectorAll(".filter-tab").forEach(t=>t.onclick=()=>{state.juzFilter=t.dataset.f;renderKhatmTab(f,body,isAdmin);});
  drawJuz(f,k);
  requestAnimationFrame(()=>{const rf=body.querySelector(".ring-fill");if(rf)rf.style.strokeDashoffset=off;});
}
function statStrip(label,val,color,bg,icon){return `<div class="stat-strip"><div class="s-lbl"><span class="s-lbl-ic" style="background:${bg};color:${color}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">${icon}</svg></span>${label}</div><div class="s-val">${val}</div></div>`;}
function drawJuz(f,k){
  const grid=$("juz-grid");if(!grid)return;
  const q=(state.juzSearch||"").trim().toLowerCase();
  const filtered=k.juz.filter(j=>{if(state.juzFilter!=="all"&&j.status!==state.juzFilter)return false;if(q){const m=memberById(f,j.member_id);const hay=(j.number+" "+(m?m.name.toLowerCase():"")).toLowerCase();if(!hay.includes(q))return false;}return true;});
  if(!filtered.length){grid.style.display="block";grid.innerHTML=`<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg><h4>Nothing matches</h4><p>Try a different filter or search term.</p></div>`;return;}
  grid.style.display="grid";
  grid.innerHTML=filtered.map(j=>{const m=memberById(f,j.member_id);const lbl={available:"Available",reserved:"Reserved",completed:"Completed"}[j.status];
    const mr=m?`<div class="jt-member">${avatar(m)}${firstName(m.name)}</div>`:`<div class="jt-member" style="color:var(--ink-faint)">Open to pick</div>`;
    const check=j.status==="completed"?`<div class="jt-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>`:"";
    return `<button class="juz-tile ${j.status}" data-n="${j.number}">${check}<div class="jt-top"><div class="juz-num">${j.number}<span>Juz</span></div><span class="juz-status st-${j.status}">${lbl}</span></div>${mr}<div class="juz-name">${JUZ_NAMES[j.number-1]}</div></button>`;}).join("");
  grid.querySelectorAll(".juz-tile").forEach(t=>t.onclick=()=>onJuzClick(f,k,+t.dataset.n));
}
function onJuzClick(f,k,n){
  const j=k.juz.find(x=>x.number===n);const isAdmin=f.role==="admin";
  if(isAdmin){openJuzAdmin(f,k,n);return;}
  if(j.status==="available"){reserveJuz(f,k,j);return;}
  if(j.status==="reserved"&&j.member_id===me.id){openMemberJuz(f,k,n);return;}
  if(j.status==="reserved"){toast(`Juz ${n} is reserved by ${firstName(memberById(f,j.member_id)?.name)||"a member"}`);return;}
  if(j.status==="completed"){toast(`Juz ${n} completed by ${firstName(memberById(f,j.member_id)?.name)||"a member"}`);}
}
async function reserveJuz(f,k,j){
  const {data,error}=await sb.from("juz")
    .update({status:"reserved",member_id:me.id,reserved_at:new Date().toISOString()})
    .eq("id",j.id).eq("status","available").select();
  if(error){toast(error.message,true);return;}
  if(!data||data.length===0){toast("Someone just reserved that juz, refreshing…",true);await refresh();return;}
  toast(`Juz ${j.number} reserved for you`);await refresh();
}
function openMemberJuz(f,k,n){openModal(`${closeX()}<div class="modal-in"><h3>Juz ${n}</h3><p class="m-sub"><span class="greet-ar" style="font-size:1.1rem;color:var(--gold-deep)">${JUZ_NAMES[n-1]}</span> · Reserved by you</p><p style="font-size:.92rem;color:var(--ink-soft)">Finished reciting? Mark it completed, or release it for someone else.</p><div class="modal-actions"><button class="btn btn-ghost" onclick="releaseJuz('${f.id}','${k.id}',${n})">Release</button><button class="btn btn-primary" onclick="completeJuz('${f.id}','${k.id}',${n})">Mark completed</button></div></div>`);}
async function completeJuz(fid,kid,n){
  const f=famById(fid),k=f.khatms.find(x=>x.id===kid),j=k.juz.find(x=>x.number===n);
  const {data,error}=await sb.from("juz").update({status:"completed",completed_at:new Date().toISOString()})
    .eq("id",j.id).eq("status","reserved").eq("member_id",me.id).select();
  closeModal();
  if(error){toast(error.message,true);return;}
  if(!data||data.length===0){toast("That juz changed, refreshing…",true);await refresh();return;}
  toast(`MashaAllah! Juz ${n} completed`);await refresh();
}
async function releaseJuz(fid,kid,n){
  const f=famById(fid),k=f.khatms.find(x=>x.id===kid),j=k.juz.find(x=>x.number===n);
  const {error}=await sb.from("juz").update({status:"available",member_id:null,reserved_at:null})
    .eq("id",j.id).eq("member_id",me.id);
  closeModal();
  if(error){toast(error.message,true);return;}
  toast(`Juz ${n} released`);await refresh();
}
function openJuzAdmin(f,k,n){const j=k.juz.find(x=>x.number===n);const opts=f.members.map(u=>`<option value="${u.id}" ${j.member_id===u.id?"selected":""}>${esc(u.name)}${u.role==="admin"?" (Admin)":""}</option>`).join("");openModal(`${closeX()}<div class="modal-in"><h3>Manage Juz ${n}</h3><p class="m-sub"><span class="greet-ar" style="font-size:1.1rem;color:var(--gold-deep)">${JUZ_NAMES[n-1]}</span> · Status: ${j.status}</p><div class="field"><label>Allot to member</label><select id="allot-sel"><option value="">— Leave available —</option>${opts}</select></div><div class="field"><label>Set status</label><select id="allot-status"><option value="available" ${j.status==="available"?"selected":""}>Available</option><option value="reserved" ${j.status==="reserved"?"selected":""}>Reserved</option><option value="completed" ${j.status==="completed"?"selected":""}>Completed</option></select></div><div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="applyAllot('${f.id}','${k.id}',${n})">Save</button></div></div>`);}
async function applyAllot(fid,kid,n){
  const f=famById(fid),k=f.khatms.find(x=>x.id===kid),j=k.juz.find(x=>x.number===n);
  const mid=$("allot-sel").value;let st=$("allot-status").value;
  if(!mid)st="available";else if(st==="available")st="reserved";
  const patch={member_id:mid||null,status:st,reserved_at:mid?new Date().toISOString():null,completed_at:st==="completed"?new Date().toISOString():null};
  const {error}=await sb.from("juz").update(patch).eq("id",j.id);
  closeModal();
  if(error){toast(error.message,true);return;}
  toast(`Juz ${n} updated`);await refresh();
}
function openNewKhatm(){const f=famById(state.familyId);const cur=activeKhatm(f);openModal(`${closeX()}<div class="modal-in"><h3>Start a new khatm</h3><p class="m-sub">All 30 juz open fresh for ${esc(f.name)}.${cur?" The current active khatm will be archived first.":""}</p><div class="field"><label>Khatm name</label><input type="text" id="nk-name" placeholder="e.g. Ramadan Khatm 1447"></div><div class="field"><label>Niyyah · Intention</label><textarea id="nk-niyyah" placeholder="For whom, and with what intention…"></textarea></div><div class="modal-err" id="nk-err"></div><div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" id="nk-save" onclick="createKhatm('${f.id}')">Begin khatm</button></div></div>`);}
async function createKhatm(fid){
  const f=famById(fid);const name=$("nk-name").value.trim()||"New Family Khatm";const niyyah=$("nk-niyyah").value.trim();
  const btn=$("nk-save");btn.disabled=true;btn.textContent="Starting…";
  const cur=activeKhatm(f);
  if(cur)await sb.from("khatms").update({status:"archived",closed_at:new Date().toISOString()}).eq("id",cur.id);
  const {data:k,error}=await sb.from("khatms").insert({family_id:fid,name,niyyah}).select().single();
  if(error){closeModal();toast(error.message,true);return;}
  const rows=[];for(let n=1;n<=30;n++)rows.push({khatm_id:k.id,number:n,status:"available"});
  const {error:je}=await sb.from("juz").insert(rows);
  closeModal();
  if(je){toast(je.message,true);return;}
  toast("New khatm started, Bismillah");await refresh();
}
function confirmClose(fid,kid){const f=famById(fid),k=f.khatms.find(x=>x.id===kid);const s=khatmStats(k);openModal(`${closeX()}<div class="modal-in"><h3>Close & archive?</h3><p class="m-sub">“${esc(k.name)}” is at ${s.pct}% (${s.completed}/30 juz). Once archived it moves to History.</p><div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">Not yet</button><button class="btn btn-danger" onclick="closeKhatm('${fid}','${kid}')">Archive it</button></div></div>`);}
async function closeKhatm(fid,kid){
  const {error}=await sb.from("khatms").update({status:"archived",closed_at:new Date().toISOString()}).eq("id",kid);
  closeModal();
  if(error){toast(error.message,true);return;}
  toast("Khatm archived");state.familyTab="history";await refresh();
}
function shareWhatsApp(fid, kid) {
  const f = famById(fid);
  const k = f.khatms.find(x => x.id === kid);
  const s = khatmStats(k);
  const text = `📖 *${f.name}* - Khatm Progress\n*${k.name}*\n\nProgress: ${s.pct}% (${s.completed}/30 Juz completed)\n\nJoin us and recite together!`;
  const url = `https://api.whatsapp.com/send?text=${encodeURIComponent(text)}`;
  window.open(url, '_blank');
}
function renderMembersTab(f,body,isAdmin){
  const cards=f.members.map(u=>{let completed=0,reserved=0;f.khatms.forEach(k=>k.juz.forEach(j=>{if(j.member_id===u.id){if(j.status==="completed")completed++;if(j.status==="reserved")reserved++;}}));
    const roleAction = (isAdmin && u.id !== me.id) ? `<button class="btn btn-ghost btn-sm" style="margin-left:auto" onclick="toggleRole('${f.id}','${u.id}','${u.role === 'admin' ? 'member' : 'admin'}')">${u.role === 'admin' ? 'Demote to Member' : 'Make Admin'}</button>` : '';
    return `<div class="member-card"><div class="mc-head">${avatar(u)}<div style="flex:1"><div class="mc-name">${esc(u.name)}${u.id===me.id?" (you)":""}</div><span class="mc-role ${u.role==="admin"?"role-admin":"role-member"}">${u.role}</span></div>${roleAction}</div><div class="mc-stats"><div><b>${completed}</b><span>Completed</span></div><div><b>${reserved}</b><span>Reserved</span></div></div></div>`;}).join("");
  body.innerHTML=`<div class="admin-bar"><button class="btn btn-gold btn-sm" onclick="copyLink('${f.id}')">Copy invite link</button>${isAdmin?`<button class="btn btn-primary btn-sm" onclick="openAddMemberModal('${f.id}')">＋ Add Member</button>`:""}</div><div class="member-grid">${cards}</div>`;
}
async function toggleRole(fid, uid, newRole) {
  if (!confirm(`Are you sure you want to change this member's role to ${newRole}?`)) return;
  const { error } = await sb.from("family_members").update({ role: newRole }).eq("family_id", fid).eq("user_id", uid);
  if (error) {
    if (String(error.message).includes("row-level security")) {
      alert("Permission denied: You must run the SQL query in Supabase to allow Admins to update roles!");
    } else {
      alert("Error: " + error.message);
    }
    return;
  }
  toast(`Role updated to ${newRole}!`);
  await refresh();
}
function openAddMemberModal(fid) {
  openModal(`${closeX()}<div class="modal-in"><h3>Add Member manually</h3><p class="m-sub">Create an account for them if they don't have one, and add them instantly.</p>
    <div class="field"><label>Name</label><input type="text" id="am-name" placeholder="Member's full name"></div>
    <div class="field"><label>Email</label><input type="email" id="am-email" placeholder="member@example.com"></div>
    <div class="field"><label>Password (for new account)</label><input type="password" id="am-pass" placeholder="At least 6 chars"></div>
    <div class="modal-err" id="am-err"></div>
    <div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" id="am-save" onclick="adminAddMember('${fid}')">Add Member</button></div></div>`);
}
async function adminAddMember(fid) {
  const name = $("am-name").value.trim(), email = $("am-email").value.trim().toLowerCase(), password = $("am-pass").value;
  const err = $("am-err"), btn = $("am-save");
  if (!name || !email || !password) { err.textContent = "Please fill in all fields."; return; }
  if (password.length < 6) { err.textContent = "Password must be at least 6 characters."; return; }
  
  btn.disabled = true; btn.textContent = "Adding...";
  let userId = null;
  
  const { data: existingProfile } = await sb.from("profiles").select("id").eq("email", email).maybeSingle();
  if (existingProfile) {
    userId = existingProfile.id;
  } else {
    const tempSb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, { auth: { persistSession: false } });
    const { data: signUpData, error: signUpErr } = await tempSb.auth.signUp({ email, password, options: { data: { name } } });
    if (signUpErr) { 
      if (signUpErr.message.includes("already registered")) {
        err.textContent = "This email is already registered, but not visible. They must join via the invite link.";
      } else {
        err.textContent = signUpErr.message; 
      }
      btn.disabled = false; btn.textContent = "Add Member"; return; 
    }
    if (signUpData.user) {
      userId = signUpData.user.id;
      await new Promise(r => setTimeout(r, 800)); // wait for profile trigger
    }
  }
  
  if (userId) {
    const { error: joinErr } = await sb.from("family_members").insert({ family_id: fid, user_id: userId, role: "member" });
    if (joinErr && joinErr.code === "23505") {
      err.textContent = "This member is already in the family."; btn.disabled = false; btn.textContent = "Add Member"; return;
    }
    if (joinErr) {
      err.textContent = joinErr.message; btn.disabled = false; btn.textContent = "Add Member"; return;
    }
    closeModal();
    toast(`Added ${name} to the family!`);
    await refresh();
  } else {
    err.textContent = "Failed to obtain user ID.";
    btn.disabled = false; btn.textContent = "Add Member";
  }
}

function renderHistoryTab(f,body){
  const rows=f.khatms.map(k=>{const s=khatmStats(k);const badge=k.status==="active"?`<span class="kr-badge badge-active">Active</span>`:`<span class="kr-badge badge-archived">Archived</span>`;
    return `<div class="khatm-row"><div><div class="kr-title">${esc(k.name)} ${badge}</div>${k.niyyah?`<div class="kr-niyyah">${esc(k.niyyah)}</div>`:""}<div class="kr-meta"><span>Started <b>${fmtDate(k.started_at)}</b></span>${k.closed_at?`<span>Closed <b>${fmtDate(k.closed_at)}</b></span>`:""}<span><b>${s.completed}</b>/30 juz</span></div></div><div class="kr-right"><div class="kr-pct">${s.pct}%</div><div class="kr-pct-lbl">Complete</div></div></div>`;}).join("");
  body.innerHTML=f.khatms.length?`<div class="khatm-list">${rows}</div>`:`<div class="panel empty"><h4>No khatms yet</h4></div>`;
}

/* ================= CREATE / JOIN FAMILY ================= */
function openCreateFamily(){openModal(`${closeX()}<div class="modal-in"><h3>Create a family</h3><p class="m-sub">You'll become its admin. A join link is generated so anyone you share it with can join, no code required.</p><div class="field"><label>Family name</label><input type="text" id="cf-name" placeholder="e.g. Rahman Family"></div><div class="modal-err" id="cf-err"></div><div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" id="cf-save" onclick="createFamily()">Create family</button></div></div>`);}
async function createFamily(){
  const name=$("cf-name").value.trim();
  if(!name){$("cf-err").textContent="Give your family a name.";return;}
  const btn=$("cf-save");btn.disabled=true;btn.textContent="Creating…";
  // created_by is set by the database (default auth.uid()); do NOT send it from the client
  const {data:fam,error}=await sb.from("families").insert({name}).select().single();
  if(error){$("cf-err").textContent=error.message;btn.disabled=false;btn.textContent="Create family";return;}
  await loadAll();buildFamNav();
  openCreatedFamily(fam.id);
}
function openCreatedFamily(fid){const f=famById(fid)||{id:fid,name:"Your family",join_token:""};const url=joinUrl(f.join_token);openModal(`${closeX()}<div class="modal-in"><h3>${esc(f.name)} is ready</h3><p class="m-sub">Share this link with anyone you want to join. They just open it and they're in.</p><div class="link-out"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>${esc(url)}</div><div class="modal-actions"><button class="btn btn-ghost" onclick="copyLink('${f.id}')">Copy link</button><button class="btn btn-primary" onclick="closeModal();openFamily('${f.id}')">Open family</button></div></div>`);}
function openJoinFamily(){openModal(`${closeX()}<div class="modal-in"><h3>Join a family</h3><p class="m-sub">Paste the invite link someone shared with you. No code needed.</p><div class="field"><label>Invite link</label><input type="text" id="jf-link" placeholder="https://…?join=…"></div><div class="modal-err" id="jf-err"></div><div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" id="jf-save" onclick="joinFamily()">Join</button></div></div>`);}
async function joinFamily(){
  const raw=$("jf-link").value.trim();
  if(!raw){$("jf-err").textContent="Paste an invite link.";return;}
  let token=raw;
  try{token=new URL(raw).searchParams.get("join")||raw;}catch(e){}
  const btn=$("jf-save");btn.disabled=true;btn.textContent="Joining…";
  const {data:fam}=await sb.from("families").select("id,name").eq("join_token",token).maybeSingle();
  if(!fam){$("jf-err").textContent="That link or code isn't valid.";btn.disabled=false;btn.textContent="Join";return;}
  const {error}=await sb.from("family_members").insert({family_id:fam.id,user_id:me.id,role:"member"});
  if(error&&error.code==="23505"){$("jf-err").textContent="You're already in that family.";btn.disabled=false;btn.textContent="Join";return;}
  if(error){$("jf-err").textContent=error.message;btn.disabled=false;btn.textContent="Join";return;}
  closeModal();await loadAll();buildFamNav();toast(`Joined ${fam.name}`);openFamily(fam.id);
}
function copyLink(fid){const f=famById(fid);const url=joinUrl(f.join_token);navigator.clipboard?.writeText(url).then(()=>toast("Invite link copied")).catch(()=>toast("Select and copy the link",true));}

/* ================= MODAL ================= */
const modal=$("modal");
function closeX(){return `<button class="modal-close" onclick="closeModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button>`;}
function openModal(html){modal.innerHTML=html;if(!modal.open)modal.showModal();}
function closeModal(){modal.close();}
modal.addEventListener("click",e=>{if(e.target===modal)modal.close();});

/* ================= BOOT ================= */
function showJoinBannerIfAny(){
  const token=new URLSearchParams(location.search).get("join")||sessionStorage.getItem("pendingJoin");
  if(token){$("join-banner").style.display="block";$("join-banner").innerHTML=`You've been invited to a family. <b>Log in or sign up</b> to join.`;if(new URLSearchParams(location.search).get("join"))sessionStorage.setItem("pendingJoin",token);}
}
async function boot(){
  try{
    const {data:{session}}=await sb.auth.getSession();
    if(!session){$("boot").style.display="none";$("app").style.display="none";$("auth-view").style.display="grid";showJoinBannerIfAny();return;}
    $("boot").style.display="flex";$("auth-view").style.display="none";
    await loadAll();subscribeRealtime();
    if(new URLSearchParams(location.search).get("join")){await handleJoinLink();}
    else if(sessionStorage.getItem("pendingJoin")){const t=sessionStorage.getItem("pendingJoin");sessionStorage.removeItem("pendingJoin");history.replaceState({},"",location.pathname+"?join="+t);await handleJoinLink();}
    $("boot").style.display="none";$("app").style.display="block";
    renderUserChip();buildGlobalNav();buildFamNav();go("home");
  }catch(e){
    $("boot").style.display="none";$("auth-view").style.display="grid";
    if(!String(e.message).includes("no-session")){$("auth-err").textContent=e.message;try{await sb.auth.signOut();}catch(_){}}
    showJoinBannerIfAny();
  }
}
boot();
</script>
</body>
