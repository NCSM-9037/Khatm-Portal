<style>
/* Credit line — bottom-right */
.design-ui-credit {
  position: fixed;
  bottom: 12px;
  right: 12px;
  font: 11px/1 system-ui, sans-serif;
  color: rgba(128,128,128,0.5);
  pointer-events: none;
  z-index: 2147483647;
  transition: opacity 0.4s ease;
  user-select: none;
  letter-spacing: 0.02em;
}

/* Hide chrome on touch devices */
@media (hover: none) {
  .design-ui-credit { display: none; }
}

/* Print fixes */
@media print {
  * {
    transition: none !important;
    animation: none !important;
    box-shadow: none !important;
  }
  body {
    print-color-adjust: exact;
    -webkit-print-color-adjust: exact;
  }
  .design-ui-credit { display: none !important; }
}

</style>
<script>
(function () {
    // Design-ui pages are single compositions, so the whole body is editable.
    function markEditable() {
        document.body.classList.add('artifact-editable');
    }

    // Credit badge with idle-fade. Hover devices only.
    function initChromeUI() {
        if (!matchMedia('(hover: hover)').matches) return;

        var credit = document.createElement('div');
        credit.className = 'design-ui-credit';
        credit.setAttribute('aria-hidden', 'true');
        credit.innerHTML = '\u{1F49C} by ClickUp Brain';
        document.body.appendChild(credit);

        var timer = null;
        var fade = function (out) { credit.style.opacity = out ? '0' : ''; };
        fade(true);
        var show = function () {
            fade(false);
            clearTimeout(timer);
            timer = setTimeout(function () { fade(true); }, 3000);
        };
        document.addEventListener('mousemove', show);
        show();
    }

    function init() {
        markEditable();
        initChromeUI();
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
})();

</script>

<style>
:root{
  --parchment: oklch(97.2% 0.012 85);
  --parchment-2: oklch(95% 0.014 84);
  --surface: oklch(99% 0.006 85);
  --ink: oklch(27% 0.02 60);

  --ink-faint: oklch(62% 0.014 66);
  --lapis: oklch(41% 0.105 258);
  --lapis-deep: oklch(33% 0.10 260);
  --lapis-soft: oklch(93.5% 0.03 256);
  --lapis-line: oklch(80% 0.05 256);
  --terracotta: oklch(56% 0.14 35);
  --terracotta-soft: oklch(94% 0.04 45);
  --gold: oklch(72% 0.10 82);
  --gold-soft: oklch(93% 0.05 85);
  --gold-deep: oklch(58% 0.09 78);
  --whatsapp: oklch(60% 0.14 150);
  --whatsapp-deep: oklch(52% 0.15 150);
  --whatsapp-soft: oklch(94% 0.05 150);
  --border: oklch(88% 0.014 80);
  --border-strong: oklch(82% 0.018 78);
  --success: oklch(52% 0.10 160);

  --space-xs:4px; --space-sm:8px; --space-md:12px; --space-lg:16px;
  --space-xl:24px; --space-2xl:32px; --space-3xl:48px; --space-4xl:64px;

  --ease-out-quint: cubic-bezier(0.22,1,0.36,1);
  --ease-out-expo: cubic-bezier(0.16,1,0.3,1);

  --shadow-sm: 0 1px 2px oklch(40% 0.03 70 / 0.06), 0 1px 3px oklch(40% 0.03 70 / 0.04);
  --shadow-md: 0 4px 12px oklch(38% 0.04 70 / 0.08), 0 2px 4px oklch(38% 0.04 70 / 0.05);
  --shadow-lg: 0 18px 45px oklch(35% 0.05 260 / 0.14);

  --font-ui: "Fraunces", Georgia, serif;
  --font-body: system-ui, -apple-system, "Segoe UI", sans-serif;
  --font-display: "Fraunces", Georgia, serif;
  --font-ar: "Amiri", serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:var(--font-body);background:var(--parchment);color:var(--ink);line-height:1.5;font-optical-sizing:auto;-webkit-font-smoothing:antialiased;min-height:100vh}
h1,h2,h3,h4{text-wrap:balance;line-height:1.15;font-weight:600}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit;font-size:1rem}
::selection{background:var(--lapis-soft)}
:focus-visible{outline:2.5px solid var(--lapis);outline-offset:2px;border-radius:3px}
.bismillah{font-family:var(--font-ar);direction:rtl;color:var(--gold-deep)}
.greet-ar{font-family:var(--font-ar);direction:rtl;unicode-bidi:isolate}

/* LOGIN */
#login-view{min-height:100vh;display:grid;place-items:center;padding:var(--space-xl);
  background:radial-gradient(circle at 15% 18%, oklch(94% 0.035 256 / 0.7), transparent 42%),radial-gradient(circle at 85% 82%, oklch(94% 0.045 45 / 0.55), transparent 45%),var(--parchment)}
.login-card{width:100%;max-width:430px;background:var(--surface);border:1px solid var(--border);border-radius:22px;box-shadow:var(--shadow-lg);padding:var(--space-3xl) var(--space-2xl);position:relative;overflow:hidden}
.login-card::before{content:"";position:absolute;inset:6px;border:1px solid var(--gold-soft);border-radius:16px;pointer-events:none}
.login-crest{width:60px;height:60px;margin:0 auto var(--space-lg);border-radius:50%;background:var(--lapis);display:grid;place-items:center;box-shadow:0 0 0 5px var(--lapis-soft),0 0 0 6px var(--gold-soft)}
.login-crest svg{width:30px;height:30px;color:var(--gold)}
.login-card h1{font-family:var(--font-display);font-size:1.85rem;text-align:center;color:var(--lapis-deep);font-weight:600;line-height:1.1;letter-spacing:-0.01em}
.login-card .sub{text-align:center;color:var(--ink-soft);font-size:0.9rem;margin-top:var(--space-xs)}
.login-bismillah{text-align:center;font-family:var(--font-ar);font-size:1.5rem;color:var(--gold-deep);margin:var(--space-lg) 0 var(--space-xl);direction:rtl}
.field{margin-bottom:var(--space-lg)}
.field label{display:block;font-size:0.78rem;font-weight:600;color:var(--ink-soft);margin-bottom:6px;letter-spacing:0.04em;text-transform:uppercase}
.field input,.field select{width:100%;padding:12px 14px;border:1.5px solid var(--border-strong);border-radius:11px;background:var(--parchment);color:var(--ink);transition:border-color .18s,box-shadow .18s,background .18s}
.field input:focus,.field select:focus{outline:none;border-color:var(--lapis);background:var(--surface);box-shadow:0 0 0 3.5px var(--lapis-soft)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 20px;border-radius:11px;font-weight:600;font-size:0.95rem;transition:transform .12s var(--ease-out-quint),background .18s,box-shadow .18s,opacity .18s;white-space:nowrap}
.btn:active{transform:translateY(1px)}
.btn:disabled{opacity:.55;cursor:not-allowed}
.btn-primary{background:var(--lapis);color:oklch(98% 0.02 85)}
.btn-primary:hover{background:var(--lapis-deep);box-shadow:var(--shadow-md)}
.btn-block{width:100%}
.btn-ghost{background:transparent;color:var(--lapis);border:1.5px solid var(--border-strong)}
.btn-ghost:hover{background:var(--lapis-soft);border-color:var(--lapis-line)}
.btn-danger{background:transparent;color:var(--terracotta);border:1.5px solid var(--terracotta-soft)}
.btn-danger:hover{background:var(--terracotta-soft)}
.btn-wa{background:var(--whatsapp);color:oklch(99% 0.01 150)}
.btn-wa:hover{background:var(--whatsapp-deep);box-shadow:var(--shadow-md)}
.btn-wa svg{width:17px;height:17px}
.btn-sm{padding:7px 13px;font-size:0.82rem;border-radius:9px}
.login-err{color:var(--terracotta);font-size:0.85rem;text-align:center;min-height:1.2em;margin-bottom:var(--space-sm)}
.login-note{color:var(--success);font-size:0.85rem;text-align:center;min-height:1.2em;margin-bottom:var(--space-sm)}
.auth-toggle{display:flex;gap:4px;background:var(--parchment-2);padding:4px;border-radius:12px;margin-bottom:var(--space-xl);border:1px solid var(--border)}
.auth-toggle button{flex:1;padding:8px;border-radius:9px;font-size:0.85rem;font-weight:600;color:var(--ink-soft);transition:.15s}
.auth-toggle button.active{background:var(--surface);color:var(--lapis-deep);box-shadow:var(--shadow-sm)}
.mode-hint{font-size:0.8rem;color:var(--ink-faint);text-align:center;margin-top:var(--space-md);line-height:1.5}
.mode-hint code{background:var(--parchment-2);padding:2px 6px;border-radius:5px;font-size:0.85em}

/* APP SHELL */
#app{display:none;min-height:100vh}
.app-grid{display:grid;grid-template-columns:246px 1fr;min-height:100vh}
.sidebar{background:var(--lapis-deep);color:oklch(92% 0.02 256);padding:var(--space-xl) var(--space-lg);display:flex;flex-direction:column;gap:var(--space-lg);position:sticky;top:0;height:100vh}

.nav{display:flex;flex-direction:column;gap:2px;margin-top:var(--space-sm)}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;color:oklch(85% 0.025 256);font-size:0.92rem;font-weight:500;transition:background .15s,color .15s;text-align:left;width:100%}
.nav-item svg{width:18px;height:18px;opacity:.85}
.nav-item:hover{background:oklch(38% 0.08 260);color:oklch(97% 0.02 85)}

.logout-btn{display:flex;align-items:center;gap:8px;font-size:0.85rem;color:oklch(82% 0.04 40);font-weight:500;padding:6px 4px}

.avatar{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;font-size:0.8rem;font-weight:700;color:oklch(99% 0.01 85);flex-shrink:0}

/* MAIN */
.main{padding:var(--space-2xl) var(--space-3xl);max-width:1180px}

.niyyah .n-meta{margin-top:var(--space-md);font-size:0.82rem;color:var(--ink-faint);display:flex;gap:var(--space-lg);flex-wrap:wrap}

.dash-top{display:grid;grid-template-columns:minmax(0,1.15fr) minmax(0,1fr);gap:var(--space-xl);margin-bottom:var(--space-xl)}

.ring-center{position:absolute;inset:0;display:grid;place-items:center;text-align:center}
.ring-pct{font-family:var(--font-display);font-size:2.3rem;font-weight:600;color:var(--lapis-deep);line-height:1;font-variant-numeric:tabular-nums}
.ring-label{font-size:0.72rem;color:var(--ink-faint);text-transform:uppercase;letter-spacing:0.08em;margin-top:2px}
.progress-legend{display:flex;flex-direction:column;gap:var(--space-md);flex:1}
.leg-row{display:flex;align-items:center;gap:12px}
.leg-dot{width:11px;height:11px;border-radius:3px;flex-shrink:0}

.stat-strip{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:var(--space-lg) var(--space-xl);display:flex;align-items:center;justify-content:space-between;transition:transform .18s var(--ease-out-quint),box-shadow .18s}

.dash-bottom{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,340px);gap:var(--space-xl);align-items:start}
.reminder{display:flex;align-items:center;gap:var(--space-md);background:var(--gold-soft);border:1px solid oklch(84% 0.06 85);border-radius:13px;padding:var(--space-md) var(--space-lg);margin-bottom:var(--space-lg)}

.reminder .r-txt{font-size:0.9rem;color:oklch(38% 0.05 75);font-weight:500}

.reminder button{margin-left:auto;font-size:0.82rem;font-weight:600;color:var(--lapis);white-space:nowrap}

.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-md);gap:var(--space-md)}
.sec-head h3{font-size:1.05rem;color:var(--ink);font-weight:600}
.sec-head .sec-link{font-size:0.82rem;color:var(--lapis);font-weight:600;cursor:pointer}

.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:var(--space-xl);box-shadow:var(--shadow-sm)}
.feed{display:flex;flex-direction:column}

.feed-ic{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;flex-shrink:0;margin-top:2px}
.feed-ic svg{width:15px;height:15px}
.feed-body .f-txt{font-size:0.88rem;color:var(--ink);line-height:1.4}

.feed-body .f-time{font-size:0.75rem;color:var(--ink-faint);margin-top:2px}
.member-prog{display:flex;flex-direction:column;gap:var(--space-md)}

.mp-fill{height:100%;border-radius:5px;background:var(--lapis);transition:width .6s var(--ease-out-expo)}
.mp-count{font-size:0.82rem;color:var(--ink-soft);font-variant-numeric:tabular-nums;min-width:2.5ch;text-align:right;font-weight:600}

.toolbar{display:flex;gap:var(--space-md);align-items:center;flex-wrap:wrap;margin-bottom:var(--space-lg)}
.search-box{position:relative;flex:1;min-width:200px;max-width:320px}
.search-box svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--ink-faint)}
.search-box input{width:100%;padding:9px 12px 9px 36px;border:1.5px solid var(--border-strong);border-radius:10px;background:var(--surface);color:var(--ink)}
.search-box input:focus{outline:none;border-color:var(--lapis);box-shadow:0 0 0 3px var(--lapis-soft)}
.filter-tabs{display:flex;gap:4px;background:var(--parchment-2);padding:4px;border-radius:11px;border:1px solid var(--border)}
.filter-tab{padding:7px 14px;border-radius:8px;font-size:0.83rem;font-weight:600;color:var(--ink-soft);transition:.15s;white-space:nowrap}
.filter-tab .cnt{font-variant-numeric:tabular-nums;opacity:.7;margin-left:4px;font-weight:500}
.filter-tab:hover{color:var(--ink)}
.filter-tab.active{background:var(--surface);color:var(--lapis-deep);box-shadow:var(--shadow-sm)}
.juz-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(158px,1fr));gap:var(--space-md)}
.juz-tile{position:relative;background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:var(--space-lg);cursor:pointer;transition:transform .16s var(--ease-out-quint),border-color .16s,box-shadow .16s,background .16s;display:flex;flex-direction:column;gap:8px;min-height:132px;text-align:left;width:100%}
.juz-tile:hover{transform:translateY(-3px);box-shadow:var(--shadow-md)}
.juz-tile .jt-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}

.juz-num span{font-size:0.7rem;color:var(--ink-faint);font-family:var(--font-body);font-weight:500;display:block;margin-top:1px}
.juz-name{font-family:var(--font-ar);font-size:1.05rem;color:var(--gold-deep);direction:rtl;line-height:1.3;margin-top:auto}
.juz-status{display:inline-flex;align-items:center;gap:6px;font-size:0.74rem;font-weight:700;padding:3px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:0.03em;align-self:flex-start}
.jt-member{display:flex;align-items:center;gap:7px;font-size:0.8rem;color:var(--ink-soft);font-weight:500}
.jt-member .avatar{width:22px;height:22px;font-size:0.62rem}
.st-available{background:var(--parchment-2);color:var(--ink-soft)}
.juz-tile.available{border-style:dashed}

.juz-tile.reserved{border-color:oklch(84% 0.06 85);background:oklch(98.5% 0.015 85)}
.st-completed{background:var(--lapis);color:oklch(97% 0.02 85)}
.juz-tile.completed{border-color:var(--lapis-line);background:var(--lapis-soft)}
.juz-tile.completed .juz-num{color:var(--lapis-deep)}
.jt-check{position:absolute;top:10px;right:10px;width:22px;height:22px;border-radius:50%;background:var(--lapis);display:grid;place-items:center}

<script>
/* ================= SUPABASE CONFIG ================= */
const SUPABASE_URL = "https://venjpgagaxgukdvvkodp.supabase.co";
const SUPABASE_KEY = "sb_publishable_U8f0Mh_-TUbkYqr1wnvRwg_OKKCP4eS";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
/* Secondary client used ONLY to create member accounts without touching the admin's session */
const sbSignup = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, { auth:{ persistSession:false, autoRefreshToken:false, storageKey:"khatm-signup-tmp" } });

const GREETING_AR = "السَّلامُ عَلَيْكُم";
const JUZ_NAMES = ["الم","سيقول","تلك الرسل","لن تنالوا","والمحصنات","لا يحب الله","وإذا سمعوا","ولو أننا","قال الملأ","واعلموا","يعتذرون","وما من دابة","وما أبرئ","ربما","سبحان الذي","قال ألم","اقترب للناس","قد أفلح","وقال الذين","أمن خلق","اتل ما أوحي","ومن يقنت","وما لي","فمن أظلم","إليه يرد","حم","قال فما خطبكم","قد سمع الله","تبارك الذي","عم يتساءلون"];
const AVATAR_HUES = [258, 35, 160, 300, 82, 210, 20, 130];
const WA_ICON = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51l-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.71.306 1.263.489 1.694.625.712.227 1.36.195 1.872.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>';

let profile=null, family=null;
let state={ users:[], khatms:[], activity:[], juzFilter:"all", juzSearch:"" };
let currentView="dashboard";
let realtimeChan=null;

/* ================= HELPERS ================= */
const $=id=>document.getElementById(id);
function isAdmin(){ return profile && profile.role==="admin"; }
function activeKhatm(){ return state.khatms.find(k=>k.status==="active"); }
function userById(id){ return state.users.find(u=>u.id===id); }
function initials(name){ return (name||"?").split(/\s+/).map(w=>w[0]).slice(0,2).join("").toUpperCase(); }
function hueFor(id){ let h=0; for(const c of (id||"")) h=(h+c.charCodeAt(0))%AVATAR_HUES.length; return AVATAR_HUES[h]; }
function avatar(user,cls=""){ if(!user) return `<div class="avatar ${cls}" style="background:var(--border-strong)">?</div>`; return `<div class="avatar ${cls}" style="background:oklch(55% 0.11 ${hueFor(user.id)})">${initials(user.name)}</div>`; }
function firstName(n){ return (n||"").split(" ")[0]; }
function greeting(){ return `<span class="greet-ar">${GREETING_AR}</span>, ${firstName(profile.name)}`; }
function timeAgo(ts){ const d=Date.now()-new Date(ts).getTime(),day=864e5,hr=36e5; if(d<hr)return Math.max(1,Math.round(d/6e4))+"m ago"; if(d<day)return Math.round(d/hr)+"h ago"; const days=Math.round(d/day); if(days===1)return"yesterday"; if(days<30)return days+"d ago"; return new Date(ts).toLocaleDateString("en-GB",{day:"numeric",month:"short"});}
function fmtDate(ts){ return new Date(ts).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"});}
function khatmStats(k){ const j=k.juz||[]; const completed=j.filter(x=>x.status==="completed").length,reserved=j.filter(x=>x.status==="reserved").length,available=j.filter(x=>x.status==="available").length; return {completed,reserved,available,remaining:30-completed,pct:Math.round(completed/30*100)};}
function esc(s){ return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

function toast(msg,err){ const el=document.createElement("div"); el.className="toast"+(err?" err":""); el.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${err?'<circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/>':'<polyline points="20 6 9 17 4 12"/>'}</svg><span>${msg}</span>`; $("toasts").appendChild(el); setTimeout(()=>{el.style.transition="opacity .3s,transform .3s";el.style.opacity="0";el.style.transform="translateY(10px)";setTimeout(()=>el.remove(),300)},err?4200:2600);}

/* ================= WHATSAPP SHARE ================= */
function openWhatsApp(text){ window.open("https://wa.me/?text="+encodeURIComponent(text),"_blank"); }
function progressMessage(){ const k=activeKhatm(); const url=location.href.split("#")[0]; if(!k) return `📖 ${family?family.name:"Our family"} Khatm Portal\n\nNo active khatm right now.\n${url}`; const s=khatmStats(k); const bars=Math.round(s.pct/10); const bar="🟩".repeat(bars)+"⬜".repeat(10-bars); const pending=k.juz.filter(j=>j.status!=="completed").map(j=>j.number); let msg=`📖 *${k.name}*\n${family?family.name:""}\n\n${bar} ${s.pct}%\n✅ Completed: ${s.completed}/30\n⏳ Reserved: ${s.reserved}\n⬜ Remaining: ${s.remaining}\n`; if(k.niyyah) msg+=`\n🤲 Niyyah: ${k.niyyah}\n`; if(pending.length && pending.length<=30) msg+=`\nJuz still remaining: ${pending.join(", ")}\n`; msg+=`\nPick your juz here:\n${url}`; return msg; }
function inviteMessage(){ const url=location.href.split("#")[0]; return `📖 *${family?family.name:"Our family"} Qur'an Khatm Portal*\n\nJoin our family khatm. Open the link below, choose *Sign up → Join a family*, and paste this code:\n\n🔑 ${profile?profile.family_id:""}\n\n${url}`; }
function shareProgress(){ const msg=progressMessage(); openModal(`${closeX()}<div class="modal-in"><h3>Share to WhatsApp</h3><p class="m-sub">This message will open in WhatsApp. Pick your family group to post it.</p><div class="share-preview">${esc(msg)}</div><div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-wa" onclick="closeModal();openWhatsApp(progressMessage())">${WA_ICON}Open WhatsApp</button></div></div>`); }
function shareInvite(){ const msg=inviteMessage(); openModal(`${closeX()}<div class="modal-in"><h3>Invite family on WhatsApp</h3><p class="m-sub">Sends the join link + family code. They pick "Join a family" and paste the code.</p><div class="share-preview">${esc(msg)}</div><div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-wa" onclick="closeModal();openWhatsApp(inviteMessage())">${WA_ICON}Open WhatsApp</button></div></div>`); }

/* ================= AUTH UI ================= */
let signupMode="new";
$("tab-login").onclick=()=>switchAuth("login");
$("tab-signup").onclick=()=>switchAuth("signup");
function switchAuth(t){ $("auth-err").textContent=""; $("auth-note").textContent=""; const login=t==="login"; $("tab-login").classList.toggle("active",login); $("tab-signup").classList.toggle("active",!login); $("form-login").style.display=login?"block":"none"; $("form-signup").style.display=login?"none":"block"; }

/* ================= DATA LOADING ================= */
async function loadAll(){
  const {data:{user}}=await sb.auth.getUser();
  if(!user) throw new Error("no-session");
  let {data:prof,error:pe}=await sb.from("profiles").select("*").eq("id",user.id).single();
  if(pe||!prof){ throw new Error("Profile not ready yet. If you just signed up, wait a moment and refresh."); }
  profile=prof;
  const {data:fam}=await sb.from("families").select("*").eq("id",profile.family_id).single();
  family=fam;
  const {data:members}=await sb.from("profiles").select("*").eq("family_id",profile.family_id).order("created_at");
  state.users=members||[];
  const {data:khatms}=await sb.from("khatms").select("*").eq("family_id",profile.family_id).order("started_at",{ascending:false});
  const ids=(khatms||[]).map(k=>k.id);
  let juz=[]; if(ids.length){ const {data:jz}=await sb.from("juz").select("*").in("khatm_id",ids); juz=jz||[]; }
  state.khatms=(khatms||[]).map(k=>({ id:k.id,name:k.name,niyyah:k.niyyah,status:k.status,startedAt:k.started_at,closedAt:k.closed_at,
    juz:juz.filter(j=>j.khatm_id===k.id).sort((a,b)=>a.number-b.number).map(j=>({number:j.number,status:j.status,memberId:j.member_id,completedAt:j.completed_at,reservedAt:j.reserved_at,_id:j.id})) }));
  const {data:act}=await sb.from("activity").select("*").eq("family_id",profile.family_id).order("created_at",{ascending:false}).limit(40);
  state.activity=(act||[]).map(a=>({id:a.id,ts:a.created_at,text:a.text,type:a.type}));
}
function subscribeRealtime(){ if(realtimeChan) sb.removeChannel(realtimeChan); realtimeChan=sb.channel("family-"+profile.family_id).on("postgres_changes",{event:"*",schema:"public",table:"juz"},debouncedReload).on("postgres_changes",{event:"*",schema:"public",table:"khatms"},debouncedReload).on("postgres_changes",{event:"*",schema:"public",table:"activity"},debouncedReload).on("postgres_changes",{event:"*",schema:"public",table:"profiles"},debouncedReload).subscribe(); }
let reloadTimer=null;
function debouncedReload(){ clearTimeout(reloadTimer); reloadTimer=setTimeout(async()=>{ try{ await loadAll(); render(); }catch(e){} },400); }

/* ================= DB ACTIONS ================= */
async function logActivity(text,type,khatmId){ await sb.from("activity").insert({ family_id:profile.family_id, khatm_id:khatmId||null, actor_id:profile.id, text, type:type||"default" }); }
async function reserveJuz(n){ const k=activeKhatm(); const j=k.juz.find(x=>x.number===n); const {error}=await sb.from("juz").update({status:"reserved",member_id:profile.id,reserved_at:new Date().toISOString()}).eq("id",j._id); if(error) return toast(error.message,true); await logActivity(`**${profile.name}** reserved **Juz ${n}**`,"reserve",k.id); toast(`Juz ${n} reserved for you`); await refresh(); }
async function completeJuz(n){ const k=activeKhatm(); const j=k.juz.find(x=>x.number===n); const {error}=await sb.from("juz").update({status:"completed",completed_at:new Date().toISOString()}).eq("id",j._id); if(error){closeModal();return toast(error.message,true);} await logActivity(`**${userById(j.memberId)?.name||profile.name}** completed **Juz ${n}**`,"complete",k.id); closeModal(); toast(`MashaAllah! Juz ${n} completed`); await refresh(); }
async function releaseJuz(n){ const k=activeKhatm(); const j=k.juz.find(x=>x.number===n); const {error}=await sb.from("juz").update({status:"available",member_id:null,reserved_at:null}).eq("id",j._id); if(error){closeModal();return toast(error.message,true);} closeModal(); toast(`Juz ${n} released`); await refresh(); }
async function applyAllot(n){ const k=activeKhatm(); const j=k.juz.find(x=>x.number===n); const mid=$("allot-sel").value; let st=$("allot-status").value; if(!mid)st="available";else if(st==="available")st="reserved"; const patch={member_id:mid||null,status:st,reserved_at:mid?new Date().toISOString():null,completed_at:st==="completed"?new Date().toISOString():null}; const {error}=await sb.from("juz").update(patch).eq("id",j._id); if(error){closeModal();return toast(error.message,true);} if(mid)await logActivity(`**${profile.name}** allotted **Juz ${n}** to **${userById(mid)?.name}** (${st})`,"reserve",k.id); closeModal(); toast(`Juz ${n} updated`); await refresh(); }
async function createKhatm(){ const name=$("nk-name").value.trim()||"New Family Khatm"; const niyyah=$("nk-niyyah").value.trim()||"For the barakah of our family and the good of everyone."; const cur=activeKhatm(); if(cur){await sb.from("khatms").update({status:"archived",closed_at:new Date().toISOString()}).eq("id",cur.id);} const {data,error}=await sb.from("khatms").insert({family_id:profile.family_id,name,niyyah,created_by:profile.id}).select().single(); if(error){closeModal();return toast(error.message,true);} await logActivity(`**${profile.name}** started a new khatm: **${name}**`,"start",data.id); closeModal(); toast("New khatm started, Bismillah"); await refresh(); go("khatm"); }
async function closeKhatm(){ const k=activeKhatm(); const {error}=await sb.from("khatms").update({status:"archived",closed_at:new Date().toISOString()}).eq("id",k.id); if(error){closeModal();return toast(error.message,true);} await logActivity(`**${profile.name}** closed & archived **${k.name}**`,"start",k.id); closeModal(); toast("Khatm archived"); await refresh(); go("history"); }
async function saveMember(id){ const name=$("m-name").value.trim(); const role=$("m-role").value; if(!name){return toast("Name is required",true);} const {error}=await sb.from("profiles").update({name,role}).eq("id",id); if(error){closeModal();return toast(error.message,true);} closeModal(); toast(`${firstName(name)} updated`); await refresh(); if(id===profile.id){renderUserChip();buildNav();} }
async function doRemoveMember(id){ const ids=[]; state.khatms.forEach(k=>k.juz.forEach(j=>{if(j.memberId===id&&j.status==="reserved")ids.push(j._id);})); for(const jid of ids){await sb.from("juz").update({status:"available",member_id:null,reserved_at:null}).eq("id",jid);} const {error}=await sb.from("profiles").delete().eq("id",id); if(error){closeModal();return toast(error.message,true);} closeModal(); toast("Member removed from family"); await refresh(); }

/* Admin creates a member account directly (email + password) using the secondary client,
   so the admin's own session is never disturbed. The DB trigger builds the profile
   from the metadata (family_id + role). */
async function createMemberAccount(){
  const name=$("am-name").value.trim(), email=$("am-email").value.trim(), password=$("am-pass").value, role=$("am-role").value;
  const err=$("am-err"); err.textContent="";
  if(!name||!email||!password){ err.textContent="Fill in name, email and password."; return; }
  if(password.length<6){ err.textContent="Password must be at least 6 characters."; return; }
  const btn=$("am-save"); btn.disabled=true; btn.textContent="Creating…";
  const {data,error}=await sbSignup.auth.signUp({ email, password, options:{ data:{ name, family_id:profile.family_id, role } } });
  await sbSignup.auth.signOut();
  btn.disabled=false; btn.textContent="Create member";
  if(error){ err.textContent=error.message; return; }
  await logActivity(`**${profile.name}** added **${name}** to the family`,"start");
  closeModal();
  toast(`${firstName(name)} added. Share their email + password so they can log in.`);
  setTimeout(refresh,900); // give the trigger a moment
}

async function refresh(){ try{ await loadAll(); render(); }catch(e){ toast("Couldn't refresh",true); } }

    <div class="niyyah"><div class="n-ar">وَأَنْ لَيْسَ لِلْإِنْسَانِ إِلَّا مَا سَعَىٰ</div><div class="n-label">Niyyah · Intention</div><div class="n-text">${esc(k.niyyah||"")}</div><div class="n-meta"><span>📖 ${esc(k.name)}</span><span>Started ${fmtDate(k.startedAt)}</span></div></div>

function statStrip(label,val,color,bg,icon){ return `<div class="stat-strip"><div class="s-lbl"><span class="s-lbl-ic" style="background:${bg};color:${color}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">${icon}</svg></span>${label}</div><div class="s-val">${val}</div></div>`; }
function feedRow(a){ const map={complete:["var(--lapis)","var(--lapis-soft)",'<polyline points="20 6 9 17 4 12"/>'],reserve:["var(--gold-deep)","var(--gold-soft)",'<path d="M20 6 9 17l-5-5"/>'],start:["var(--terracotta)","var(--terracotta-soft)",'<circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/>'],default:["var(--ink-soft)","var(--parchment-2)",'<circle cx="12" cy="12" r="3"/>']}; const [c,bg,ic]=map[a.type]||map.default; return `<div class="feed-item"><div class="feed-ic" style="background:${bg};color:${c}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ic}</svg></div><div class="feed-body"><div class="f-txt">${a.text}</div><div class="f-time">${timeAgo(a.ts)}</div></div></div>`; }

/* ================= CURRENT KHATM ================= */
function renderKhatm(){
  const k=activeKhatm(); const el=$("view-khatm");
  if(!k){ el.innerHTML=`${topbar("Current Khatm","")}<div class="panel empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg><h4>No active khatm</h4><p>${isAdmin()?"Start one to open the 30 juz for the family.":"Nothing to recite yet, InshaAllah soon."}</p>${isAdmin()?`<div style="margin-top:16px"><button class="btn btn-primary" onclick="openNewKhatm()">Start new khatm</button></div>`:""}</div>`; return; }
  const s=khatmStats(k);
  const adminBar=isAdmin()?`<div class="admin-bar"><button class="btn btn-ghost btn-sm" onclick="openNewKhatm()">＋ New khatm</button><button class="btn btn-danger btn-sm" onclick="confirmClose()">Close & archive this khatm</button></div>`:"";
  el.innerHTML=`${topbar(esc(k.name),`${s.completed} of 30 juz complete · ${s.pct}%`,waButton("shareProgress()","Share progress"))}${adminBar}
    <div class="toolbar">
      <div class="search-box"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg><input type="text" id="juz-search" placeholder="Search juz number or member…" value="${esc(state.juzSearch||"")}"></div>
      <div class="filter-tabs">${["all","available","reserved","completed"].map(f=>{const cnt=f==="all"?30:s[f];return `<button class="filter-tab ${state.juzFilter===f?"active":""}" data-f="${f}">${f[0].toUpperCase()+f.slice(1)}<span class="cnt">${cnt}</span></button>`;}).join("")}</div>
    </div>
    <div class="juz-grid" id="juz-grid"></div>`;
  $("juz-search").addEventListener("input",e=>{state.juzSearch=e.target.value;drawJuz(k);});
  el.querySelectorAll(".filter-tab").forEach(t=>t.onclick=()=>{state.juzFilter=t.dataset.f;renderKhatm();});
  drawJuz(k);
}
function drawJuz(k){
  const grid=$("juz-grid"); if(!grid)return;
  const q=(state.juzSearch||"").trim().toLowerCase();
  const filtered=k.juz.filter(j=>{ if(state.juzFilter!=="all"&&j.status!==state.juzFilter)return false; if(q){const mem=userById(j.memberId);const hay=(j.number+" "+(mem?mem.name.toLowerCase():"")).toLowerCase();if(!hay.includes(q))return false;} return true; });
  if(!filtered.length){ grid.style.display="block"; grid.innerHTML=`<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg><h4>Nothing matches</h4><p>Try a different filter or search term.</p></div>`; return; }
  grid.style.display="grid";
  grid.innerHTML=filtered.map(j=>{ const mem=userById(j.memberId); const stLbl={available:"Available",reserved:"Reserved",completed:"Completed"}[j.status];
    const memRow=mem?`<div class="jt-member">${avatar(mem)}${firstName(mem.name)}</div>`:`<div class="jt-member" style="color:var(--ink-faint)">Open to pick</div>`;
    const check=j.status==="completed"?`<div class="jt-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>`:"";
    return `<button class="juz-tile ${j.status}" data-n="${j.number}">${check}<div class="jt-top"><div class="juz-num">${j.number}<span>Juz</span></div><span class="juz-status st-${j.status}">${stLbl}</span></div>${memRow}<div class="juz-name">${JUZ_NAMES[j.number-1]}</div></button>`; }).join("");
  grid.querySelectorAll(".juz-tile").forEach(t=>t.onclick=()=>onJuzClick(+t.dataset.n));
}
function onJuzClick(n){ const k=activeKhatm(); const j=k.juz.find(x=>x.number===n); if(isAdmin()){openJuzAdmin(n);return;} if(j.status==="available"){reserveJuz(n);return;} if(j.status==="reserved"&&j.memberId===profile.id){openMemberJuz(n);return;} if(j.status==="reserved"){toast(`Juz ${n} is reserved by ${firstName(userById(j.memberId)?.name)||"a member"}`);return;} if(j.status==="completed"){toast(`Juz ${n} completed by ${firstName(userById(j.memberId)?.name)||"a member"}`);} }
function openMemberJuz(n){ openModal(`${closeX()}<div class="modal-in"><h3>Juz ${n}</h3><p class="m-sub"><span class="bismillah" style="font-size:1.1rem">${JUZ_NAMES[n-1]}</span> · Reserved by you</p><p style="font-size:.92rem;color:var(--ink-soft);margin-bottom:4px">Finished reciting? Mark it completed, or release it for someone else.</p><div class="modal-actions"><button class="btn btn-ghost" onclick="releaseJuz(${n})">Release</button><button class="btn btn-primary" onclick="completeJuz(${n})">Mark completed</button></div></div>`); }
function openJuzAdmin(n){ const k=activeKhatm(); const j=k.juz.find(x=>x.number===n); const opts=state.users.map(u=>`<option value="${u.id}" ${j.memberId===u.id?"selected":""}>${esc(u.name)}${u.role==="admin"?" (Admin)":""}</option>`).join(""); openModal(`${closeX()}<div class="modal-in"><h3>Manage Juz ${n}</h3><p class="m-sub"><span class="bismillah" style="font-size:1.1rem">${JUZ_NAMES[n-1]}</span> · Status: ${j.status}</p><div class="field"><label>Allot to member</label><select id="allot-sel"><option value="">— Leave available —</option>${opts}</select></div><div class="field"><label>Set status</label><select id="allot-status"><option value="available" ${j.status==="available"?"selected":""}>Available</option><option value="reserved" ${j.status==="reserved"?"selected":""}>Reserved</option><option value="completed" ${j.status==="completed"?"selected":""}>Completed</option></select></div><div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="applyAllot(${n})">Save</button></div></div>`); }
function openNewKhatm(){ const cur=activeKhatm(); openModal(`${closeX()}<div class="modal-in"><h3>Start a new khatm</h3><p class="m-sub">All 30 juz open fresh for the family.${cur?" The current active khatm will be archived first.":""}</p><div class="field"><label>Khatm name</label><input type="text" id="nk-name" placeholder="e.g. Ramadan Khatm 1448"></div><div class="field"><label>Niyyah · Intention</label><textarea id="nk-niyyah" placeholder="For whom, and with what intention..."></textarea></div><div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="createKhatm()">Begin khatm</button></div></div>`); }
function confirmClose(){ const k=activeKhatm(); const s=khatmStats(k); openModal(`${closeX()}<div class="modal-in"><h3>Close & archive?</h3><p class="m-sub">"${esc(k.name)}" is at ${s.pct}% (${s.completed}/30 juz). Once archived it moves to History.</p><div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">Not yet</button><button class="btn btn-danger" onclick="closeKhatm()">Archive it</button></div></div>`); }

/* ================= HISTORY ================= */
function renderHistory(){
  const el=$("view-history");
  const rows=state.khatms.map(k=>{ const s=khatmStats(k); const badge=k.status==="active"?`<span class="kr-badge badge-active">Active</span>`:`<span class="kr-badge badge-archived">Archived</span>`;
    return `<div class="khatm-row"><div><div class="kr-title">${esc(k.name)} ${badge}</div><div class="kr-niyyah">${esc(k.niyyah||"")}</div><div class="kr-meta"><span>Started <b>${fmtDate(k.startedAt)}</b></span>${k.closedAt?`<span>Closed <b>${fmtDate(k.closedAt)}</b></span>`:""}<span><b>${s.completed}</b>/30 juz</span><span class="wa-mini" onclick="shareKhatm('${k.id}')">${WA_ICON}Share</span></div></div><div class="kr-right"><div class="kr-pct">${s.pct}%</div><div class="kr-pct-lbl">Complete</div></div></div>`; }).join("");
  el.innerHTML=`${topbar("Khatm History","All your family khatms")}${state.khatms.length?`<div class="khatm-list">${rows}</div>`:`<div class="panel empty"><h4>No khatms yet</h4></div>`}`;
}
function shareKhatm(id){ const k=state.khatms.find(x=>x.id===id); if(!k)return; const s=khatmStats(k); const url=location.href.split("#")[0]; const bars=Math.round(s.pct/10); const bar="🟩".repeat(bars)+"⬜".repeat(10-bars); let msg=`📖 *${k.name}*\n${family?family.name:""}\n\n${bar} ${s.pct}%\n✅ ${s.completed}/30 juz completed\n`; if(k.niyyah)msg+=`\n🤲 ${k.niyyah}\n`; msg+=`\n${url}`; openWhatsApp(msg); }

/* ================= MEMBERS ================= */
function renderMembers(){
  const el=$("view-members");
  if(!isAdmin()){ el.innerHTML=topbar("Members","")+`<div class="panel empty"><h4>Admins only</h4></div>`; return; }
  const cards=state.users.map(u=>{ let completed=0,reserved=0; state.khatms.forEach(k=>k.juz.forEach(j=>{if(j.memberId===u.id){if(j.status==="completed")completed++;if(j.status==="reserved")reserved++;}}));
    return `<div class="member-card"><div class="mc-head">${avatar(u)}<div><div class="mc-name">${esc(u.name)}</div><div class="mc-user">${u.role==="admin"?"Administrator":"Family member"}</div></div></div><span class="mc-role ${u.role==="admin"?"role-admin":"role-member"}">${u.role}</span><div class="mc-stats"><div><b>${completed}</b><span>Completed</span></div><div><b>${reserved}</b><span>Reserved</span></div></div><div class="mc-actions"><button class="btn btn-ghost btn-sm" onclick="openMember('${u.id}')">Edit</button>${u.id!==profile.id?`<button class="btn btn-danger btn-sm" onclick="removeMember('${u.id}')">Remove</button>`:""}</div></div>`; }).join("");
  el.innerHTML=`${topbar("Family Members","Manage your family members")}
    <div class="admin-actions"><button class="btn btn-primary btn-sm" onclick="openAddMember()">＋ Add member (email + password)</button>${waButton("shareInvite()","Invite on WhatsApp")}</div>
    <div class="invite-box">${WA_ICON.replace('viewBox','width="20" height="20" style="color:var(--whatsapp-deep);flex-shrink:0" viewBox')}<span class="ib-txt">Family can also join themselves: send the WhatsApp invite, or share this <b>family code</b> to paste under "Join a family"</span><code onclick="copyCode()">${profile.family_id}</code><button class="btn btn-wa btn-sm" onclick="shareInvite()">${WA_ICON}Send invite</button></div>
    <div class="member-grid">${cards}</div>`;
}
function copyCode(){ navigator.clipboard?.writeText(profile.family_id).then(()=>toast("Family code copied")).catch(()=>toast("Select and copy the code",true)); }
function openAddMember(){ openModal(`${closeX()}<div class="modal-in"><h3>Add family member</h3><p class="m-sub">Create their login directly. They won't need to sign up, just give them the email and password you set here.</p>
  <div class="field"><label>Full name</label><input type="text" id="am-name" placeholder="Full name"></div>
  <div class="field"><label>Email</label><input type="email" id="am-email" placeholder="member@example.com"></div>
  <div class="field"><label>Password</label><input type="text" id="am-pass" placeholder="At least 6 characters"></div>
  <div class="field"><label>Role</label><select id="am-role"><option value="member">Family Member</option><option value="admin">Admin</option></select></div>
  <div class="modal-err" id="am-err"></div>
  <div class="cred-note">Tip: use a password like <b>${esc(family?family.name.split(" ")[0]:"khatm")}786</b>. Share the email + password with them privately (WhatsApp DM works).</div>
  <div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" id="am-save" onclick="createMemberAccount()">Create member</button></div></div>`); }
function openMember(id){ const u=userById(id); openModal(`${closeX()}<div class="modal-in"><h3>Edit member</h3><p class="m-sub">Update their display name or role. Login email/password stays with the member.</p><div class="field"><label>Full name</label><input type="text" id="m-name" value="${esc(u.name)}"></div><div class="field"><label>Role</label><select id="m-role"><option value="member" ${u.role==="member"?"selected":""}>Family Member</option><option value="admin" ${u.role==="admin"?"selected":""}>Admin</option></select></div><div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveMember('${id}')">Save</button></div></div>`); }
function removeMember(id){ const u=userById(id); openModal(`${closeX()}<div class="modal-in"><h3>Remove ${firstName(u.name)}?</h3><p class="m-sub">Their reserved juz will be released and their profile removed from this family. Completed juz stay in history.</p><div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-danger" onclick="doRemoveMember('${id}')">Remove</button></div></div>`); }

/* ================= ACTIVITY ================= */
function renderActivity(){ const el=$("view-activity"); const items=state.activity.map(feedRow).join(""); el.innerHTML=`${topbar("Activity","Family activity")}<div class="panel"><div class="feed">${items||`<div class="empty"><h4>No activity yet</h4></div>`}</div></div>`; }

/* ================= MODAL ================= */
const modal=$("modal");
function closeX(){ return `<button class="modal-close" onclick="closeModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button>`; }
function openModal(html){ modal.innerHTML=html; if(!modal.open)modal.showModal(); }
function closeModal(){ modal.close(); }
modal.addEventListener("click",e=>{ if(e.target===modal)modal.close(); });

/* ================= BOOT ================= */
async function boot(){
  try{
    const {data:{session}}=await sb.auth.getSession();
    if(!session){ $("boot").style.display="none"; $("login-view").style.display="grid"; $("app").style.display="none"; return; }
    $("boot").style.display="flex"; $("login-view").style.display="none";
    await loadAll(); subscribeRealtime();
    $("boot").style.display="none"; $("app").style.display="block";
    buildNav(); renderUserChip(); go("dashboard");
  }catch(e){
    $("boot").style.display="none";
    if(String(e.message).includes("no-session")){ $("login-view").style.display="grid"; }
    else{ $("login-view").style.display="grid"; $("auth-err").textContent=e.message; try{await sb.auth.signOut();}catch(_){} }
  }
}
boot();
</script>
</body>
</html>
